[project]
site_name = "orchcore"
site_description = "Reusable orchestration core for AI coding agent CLI pipelines"
site_url = "https://abdelazizmoustafa10m.github.io/orchcore/"
docs_dir = "doc"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quick Start" = "getting-started/quickstart.md" },
  ] },
  { "Reference" = [
    { "Configuration" = "reference/configuration.md" },
    { "Stream Events" = "reference/stream-events.md" },
    { "UICallback Protocol" = "reference/ui-callback.md" },
  ] },
  { "Architecture" = [
    { "Overview" = "architecture/overview.md" },
    { "Stream Pipeline" = "architecture/stream-pipeline.md" },
    { "Design Document" = "architecture/design.md" },
  ] },
  { "Guides" = [
    { "Writing a UICallback" = "guides/writing-a-uicallback.md" },
    { "Agent Registry" = "guides/agent-registry.md" },
    { "Recovery & Retry" = "guides/recovery-and-retry.md" },
  ] },
  { "Development" = [
    { "Contributing" = "development/contributing.md" },
  ] },
  { "ADRs" = [
    { "001 — Extract Reusable Core" = "architecture/adrs/001-extract-reusable-orchestration-core.md" },
    { "002 — Async-First with asyncio" = "architecture/adrs/002-async-first-architecture-with-asyncio.md" },
    { "003 — Protocol-Based UI" = "architecture/adrs/003-protocol-based-ui-decoupling.md" },
    { "004 — Stream Pipeline" = "architecture/adrs/004-composable-stream-processing-pipeline.md" },
    { "005 — Layered Configuration" = "architecture/adrs/005-multi-source-layered-configuration.md" },
    { "006 — Pydantic Models" = "architecture/adrs/006-pydantic-for-all-data-models.md" },
    { "007 — Registry Pattern" = "architecture/adrs/007-registry-pattern-for-agent-management.md" },
    { "008 — Partial Failure & Retry" = "architecture/adrs/008-partial-failure-semantics-with-retry.md" },
    { "009 — Phase-Level Tools" = "architecture/adrs/009-tool-assignment-as-phase-level-concern.md" },
  ] },
]

[project.theme]
language = "en"

features = [
  "navigation.instant",
  "navigation.tracking",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "search.highlight",
  "content.code.copy",
  "content.code.annotate",
  "content.action.edit",
  "content.tabs.link",
]

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/AbdelazizMoustafa10m/orchcore"
