name: CI

on:
  pull_request:
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit Message (PR Title)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the type prefix"

  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check --diff src/ tests/

      - name: Check linting rules
        run: uv run ruff check src/ tests/

  typecheck:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy src/orchcore/ --strict

  verifytypes:
    name: Type Completeness (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install package
        run: uv sync --frozen

      - name: Verify public API types
        run: uv run pyright --verifytypes orchcore --ignoreexternal

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: |
          uv run pytest tests/ -v \
            --junitxml=report.xml \
            --cov=orchcore \
            --cov-report=xml \
            --cov-report=term

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: report.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [commitlint, lint, typecheck, verifytypes, test]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "CI Summary"
          echo "=========="
          echo "commitlint:  ${{ needs.commitlint.result }}"
          echo "lint:        ${{ needs.lint.result }}"
          echo "typecheck:   ${{ needs.typecheck.result }}"
          echo "verifytypes: ${{ needs.verifytypes.result }}"
          echo "test:        ${{ needs.test.result }}"

          # commitlint is skipped on push events (not a PR), so allow skipped
          if [[ "${{ needs.commitlint.result }}" != "success" && "${{ needs.commitlint.result }}" != "skipped" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.verifytypes.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "Some checks failed!"
            exit 1
          else
            echo "All checks passed!"
          fi
