name: CI

on:
  pull_request:
    paths:
      - '**/*.py'
      - '.pre-commit-config.yaml'
      - '.github/dependabot.yml'
      - '.github/workflows/*.yml'
      - 'LICENSE'
      - 'pyproject.toml'
      - 'README.md'
      - 'uv.lock'
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '.pre-commit-config.yaml'
      - '.github/dependabot.yml'
      - '.github/workflows/*.yml'
      - 'LICENSE'
      - 'pyproject.toml'
      - 'README.md'
      - 'uv.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Commit Message (PR Title)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the type prefix"

  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Check formatting
        run: uv run ruff format --check --diff src/ tests/

      - name: Check linting rules
        run: uv run ruff check src/ tests/

  typecheck:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy src/orchcore/ --strict

  verifytypes:
    name: Type Completeness (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install package
        run: uv sync --frozen

      - name: Verify public API types
        run: uv run pyright --verifytypes orchcore --ignoreexternal

  test:
    name: Tests (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - '3.12'
          - '3.13'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest tests/ -v

  coverage:
    name: Coverage (pytest, py3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --junitxml=report.xml \
            --cov=orchcore \
            --cov-report=xml \
            --cov-report=term

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: report.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: github.event.repository.private == false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          fail_ci_if_error: false
          files: coverage.xml
          use_oidc: true
          verbose: true

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [commitlint, lint, typecheck, verifytypes, test, coverage]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "CI Summary"
          echo "=========="
          echo "commitlint:  ${{ needs.commitlint.result }}"
          echo "lint:        ${{ needs.lint.result }}"
          echo "typecheck:   ${{ needs.typecheck.result }}"
          echo "verifytypes: ${{ needs.verifytypes.result }}"
          echo "test:        ${{ needs.test.result }}"
          echo "coverage:    ${{ needs.coverage.result }}"

          # commitlint is skipped on push events (not a PR), so allow skipped
          if [[ "${{ needs.commitlint.result }}" != "success" && "${{ needs.commitlint.result }}" != "skipped" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.verifytypes.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]]; then
            echo "Some checks failed!"
            exit 1
          else
            echo "All checks passed!"
          fi
