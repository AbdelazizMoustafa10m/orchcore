name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '**/*.py'
      - '.pre-commit-config.yaml'
      - '.github/dependabot.yml'
      - '.github/workflows/*.yml'
      - 'doc/**'
      - 'LICENSE'
      - 'pyproject.toml'
      - 'README.md'
      - 'zensical.toml'
      - 'uv.lock'
  push:
    branches:
      - main
    paths:
      - '**/*.py'
      - '.pre-commit-config.yaml'
      - '.github/dependabot.yml'
      - '.github/workflows/*.yml'
      - 'doc/**'
      - 'LICENSE'
      - 'pyproject.toml'
      - 'README.md'
      - 'zensical.toml'
      - 'uv.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Commit Message (PR Title)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: "PR title must have a description after the type prefix"

  lint:
    name: Lint & Format (ruff, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.12'
          - '3.13'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Check formatting
        run: uv run ruff format --check --diff src/ tests/ examples/ scripts/

      - name: Check linting rules
        run: uv run ruff check src/ tests/ examples/ scripts/

      - name: Check README quickstart example
        run: uv run python scripts/check_readme_example.py

  typecheck:
    name: Type Checking (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run mypy
        run: uv run mypy src/ tests/ examples/ --strict

  verifytypes:
    name: Type Completeness (pyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install package
        run: uv sync --frozen --extra dev

      - name: Verify public API types
        run: uv run pyright --verifytypes orchcore --ignoreexternal

  test:
    name: Tests (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - '3.12'
          - '3.13'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v

  coverage:
    name: Coverage (pytest, py3.12)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dependencies
        run: uv sync --frozen --extra dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v \
            --junitxml=report.xml \
            --cov=orchcore \
            --cov-report=xml \
            --cov-report=term

      - name: Check package coverage thresholds
        run: uv run python scripts/check_coverage_thresholds.py coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: report.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

      - name: Upload coverage to Codecov
        if: github.event.repository.private == false && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          fail_ci_if_error: false
          files: coverage.xml
          use_oidc: true
          verbose: true

  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: doc/requirements.txt

      - name: Install documentation dependencies
        run: python -m pip install -r doc/requirements.txt

      - name: Build documentation
        run: zensical build

  build-smoke:
    name: Build & Smoke Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          rm -rf dist/
          uv build

      - name: Smoke test wheel
        run: uv run --isolated --no-cache --no-project --with "$(uv run python scripts/resolve_dist_artifact.py wheel)" scripts/run_smoke_test.py

      - name: Smoke test sdist
        run: uv run --isolated --no-cache --no-project --with "$(uv run python scripts/resolve_dist_artifact.py sdist)" scripts/run_smoke_test.py

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [commitlint, lint, typecheck, verifytypes, test, coverage, docs, build-smoke]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "CI Summary"
          echo "=========="
          echo "commitlint:  ${{ needs.commitlint.result }}"
          echo "lint:        ${{ needs.lint.result }}"
          echo "typecheck:   ${{ needs.typecheck.result }}"
          echo "verifytypes: ${{ needs.verifytypes.result }}"
          echo "test:        ${{ needs.test.result }}"
          echo "coverage:    ${{ needs.coverage.result }}"
          echo "docs:        ${{ needs.docs.result }}"
          echo "build-smoke: ${{ needs.build-smoke.result }}"

          # commitlint is skipped on push events (not a PR), so allow skipped
          if [[ "${{ needs.commitlint.result }}" != "success" && "${{ needs.commitlint.result }}" != "skipped" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.verifytypes.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]] || \
             [[ "${{ needs.docs.result }}" != "success" ]] || \
             [[ "${{ needs.build-smoke.result }}" != "success" ]]; then
            echo "Some checks failed!"
            exit 1
          else
            echo "All checks passed!"
          fi
